name: FETCH VENUES

on:
  schedule:
    - cron: "35 */12 * * *"
  workflow_dispatch:

concurrency:
  group: fetchvenues-${{ github.ref }}
  cancel-in-progress: false

env:
  DATA_DIRS: "bmsoutput output"
  REPO: MintBox04/fetchVenues

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    env:
      SHARD_ID: ${{ matrix.shard }}

    steps:
      # ✅ CHECKOUT CORRECT REPO (IMPORTANT FIX)
      - name: Checkout fetchVenues repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      # 🔍 DEBUG (optional – remove later)
      - name: Debug files
        run: |
          echo "Current directory:"
          pwd
          echo "Repo contents:"
          ls -R

      # 🐍 Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          pip install cloudscraper aiohttp pytz

      # 🚀 RUN SCRAPER (FIXED: no freeze + retry)
      - name: Run scraper
        run: |
          echo "Running shard $SHARD_ID"

          mkdir -p bmsoutput output

          for i in {1..5}; do
            echo "Attempt $i"

            if [ "$SHARD_ID" == "1" ]; then
              echo "Running BMS scraper"
              timeout 180 PYTHONUNBUFFERED=1 python bmsvenues.py $SHARD_ID
            else
              echo "Running District scraper"
              timeout 120 PYTHONUNBUFFERED=1 python disvenues.py
            fi

            STATUS=$?

            if [ $STATUS -eq 0 ]; then
              echo "✅ Success"
              break
            else
              echo "❌ Failed (exit $STATUS), retrying..."
              sleep 10
            fi
          done

      # 📂 PREPARE OUTPUT
      - name: Prepare shard output
        run: |
          mkdir -p shard_output/$SHARD_ID

          for dir in $DATA_DIRS; do
            cp -r $dir shard_output/$SHARD_ID/ 2>/dev/null || echo "No data in $dir"
          done

          echo "Shard output:"
          ls -R shard_output/$SHARD_ID || echo "Empty"

      # 📤 COMMIT & PUSH
      - name: Push shard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Copy back to root
          cp -r shard_output/$SHARD_ID/* ./ 2>/dev/null || true

          git add bmsoutput/ output/

          git commit -m "[skip ci] Shard $SHARD_ID $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push origin HEAD:main; then
              echo "✅ Push success"
              break
            fi

            echo "Retrying push..."
            sleep 5
          done
