name: FETCH VENUES

on:
  schedule:
    - cron: "35 */12 * * *"
  workflow_dispatch:

concurrency:
  group: fetchvenues-${{ github.ref }}
  cancel-in-progress: false

env:
  REPO: MintBox04/fetchVenues

jobs:

  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    env:
      SHARD_ID: ${{ matrix.shard }}

    steps:
      # ✅ Checkout repo with PAT
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      # 🐍 Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Install deps
      - name: Install dependencies
        run: |
          pip install cloudscraper aiohttp pytz

      # 🚀 Run scrapers
      - name: Run scrapers
        run: |
          echo "Running shard $SHARD_ID"

          cd fetchVenues

          for i in {1..5}; do
            echo "Attempt $i"

            if [ "$SHARD_ID" == "2" ]; then
              python bmsvenues.py && break
            fi

            if [ "$SHARD_ID" == "1" ]; then
              python disvenues.py && break
            fi

            echo "Retry..."
            sleep 10
          done

      # 📤 PUSH FROM INSIDE FOLDER
      - name: Commit & Push (inside fetchVenues)
        run: |
          cd fetchVenues

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bmsoutput/ output/

          git commit -m "[skip ci] Shard $SHARD_ID ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          for i in {1..10}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push origin HEAD:main; then
              echo "Push success"
              break
            fi

            echo "Push failed, retrying..."
            sleep 5
          done
