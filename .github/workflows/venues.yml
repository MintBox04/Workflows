name: FETCH VENUES

on:
  schedule:
    - cron: "35 */12 * * *"
  workflow_dispatch:

concurrency:
  group: fetchvenues-${{ github.ref }}
  cancel-in-progress: false

env:
  REPO: MintBox04/fetchVenues
  DATA_DIR_BMS: bmsoutput
  DATA_DIR_DIS: output

jobs:

# =====================================================
# 1️⃣ SCRAPE (PARALLEL SHARDS)
# =====================================================
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1,2]

    env:
      SHARD_ID: ${{ matrix.shard }}

    steps:
      # ✅ Checkout repo (PAT)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      # 🐍 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Install deps
      - name: Install dependencies
        run: |
          pip install cloudscraper aiohttp pytz

      # 🚀 Run scraper (same logic as your working file)
      - name: Run scraper
        run: |
          echo "Running shard $SHARD_ID"

          for i in {1..5}; do
            echo "Attempt $i"

            if [ "$SHARD_ID" == "2" ]; then
              python bmsvenues.py && break
            else
              python disvenues.py && break
            fi

            echo "Retry..."
            sleep 10
          done

      # 📂 Prepare shard output (same pattern)
      - name: Prepare shard output
        run: |
          mkdir -p shard_output/$SHARD_ID

          cp -r $DATA_DIR_BMS/* shard_output/$SHARD_ID/ 2>/dev/null || echo "No BMS data"
          cp -r $DATA_DIR_DIS/* shard_output/$SHARD_ID/ 2>/dev/null || echo "No DIS data"

          echo "Shard $SHARD_ID contents:"
          ls -R shard_output/$SHARD_ID || echo "Empty"

      # 📤 Push shard individually (same as your main workflow)
      - name: Push shard to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p $DATA_DIR_BMS $DATA_DIR_DIS

          cp -r shard_output/$SHARD_ID/* ./ 2>/dev/null || echo "No data to copy"

          git add $DATA_DIR_BMS/ $DATA_DIR_DIS/

          git commit -m "[skip ci] Shard $SHARD_ID ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          for i in {1..10}; do
            echo "Push attempt $i for shard $SHARD_ID"

            git pull --rebase origin main || true

            if git push origin HEAD:main; then
              echo "Push success"
              break
            fi

            echo "Retrying..."
            sleep 5
          done
