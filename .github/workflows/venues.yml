name: FETCH VENUES

on:
  schedule:
    - cron: "35 */12 * * *"
  workflow_dispatch:

concurrency:
  group: fetchvenues-${{ github.ref }}

env:
  DATA_DIRS: "bmsoutput output"
  REPO: MintBox04/fetchVenues

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    env:
      SHARD_ID: ${{ matrix.shard }}

    steps:
      # ✅ Checkout repo INTO folder (IMPORTANT)
      - name: Checkout fetchVenues repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          token: ${{ secrets.GH_PAT }}
          path: fetchVenues
          fetch-depth: 1

      # 🔍 Debug (optional)
      - name: Debug files
        run: |
          pwd
          ls -R

      # 🐍 Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          pip install cloudscraper aiohttp pytz

      # 🚀 Run scraper (WITH cd)
      - name: Run scraper
        run: |
          cd fetchVenues

          echo "Running shard $SHARD_ID"

          mkdir -p bmsoutput output

          for i in {1..5}; do
            echo "Attempt $i"

            if [ "$SHARD_ID" == "1" ]; then
              echo "Running BMS scraper"
              python bmsvenues.py $SHARD_ID
            else
              echo "Running District scraper"
              python disvenues.py
            fi

            STATUS=$?

            if [ $STATUS -eq 0 ]; then
              echo "✅ Success"
              break
            else
              echo "❌ Failed (exit $STATUS), retrying..."
              sleep 10
            fi
          done

      # 📂 Prepare output
      - name: Prepare shard output
        run: |
          mkdir -p shard_output/$SHARD_ID

          cp -r fetchVenues/bmsoutput shard_output/$SHARD_ID/ 2>/dev/null || echo "No bmsoutput"
          cp -r fetchVenues/output shard_output/$SHARD_ID/ 2>/dev/null || echo "No output"

          echo "Shard output:"
          ls -R shard_output/$SHARD_ID || echo "Empty"

      # 📤 Push changes
      - name: Push shard
        run: |
          cd fetchVenues

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bmsoutput/ output/

          git commit -m "[skip ci] Shard $SHARD_ID $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push origin HEAD:main; then
              echo "✅ Push success"
              break
            fi

            echo "Retrying push..."
            sleep 5
          done
