name: FETCH VENUES

on:
  schedule:
    - cron: "35 */12 * * *"
  workflow_dispatch:

concurrency:
  group: fetchvenues-${{ github.ref }}
  cancel-in-progress: false

env:
  DATA_DIRS: "bmsoutput output"

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    env:
      SHARD_ID: ${{ matrix.shard }}

    steps:
      # ✅ FIXED CHECKOUT
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🐍 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Install deps
      - name: Install dependencies
        run: |
          pip install cloudscraper aiohttp pytz

      # 🔍 DEBUG (keep this once)
      - name: Debug files
        run: |
          pwd
          ls -R

      # 🚀 RUN SCRAPER
      - name: Run scraper
        run: |
          echo "Running shard $SHARD_ID"

          mkdir -p bmsoutput output

          for i in {1..5}; do
            echo "Attempt $i"

            if [ "$SHARD_ID" == "1" ]; then
              python bmsvenues.py $SHARD_ID
            else
              python disvenues.py
            fi

            echo "Completed"
            break

            sleep 10
          done

      # 📂 Prepare output
      - name: Prepare shard output
        run: |
          mkdir -p shard_output/$SHARD_ID

          for dir in $DATA_DIRS; do
            cp -r $dir shard_output/$SHARD_ID/ 2>/dev/null || echo "No data in $dir"
          done

          ls -R shard_output/$SHARD_ID || echo "Empty"

      # 📤 Push
      - name: Push shard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cp -r shard_output/$SHARD_ID/* ./ 2>/dev/null || true

          git add bmsoutput/ output/

          git commit -m "[skip ci] Shard $SHARD_ID $(date -u)" || echo "No changes"

          for i in {1..5}; do
            git pull --rebase origin main || true

            if git push; then
              echo "Push success"
              break
            fi

            sleep 5
          done
