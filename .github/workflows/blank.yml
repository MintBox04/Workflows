name: FETCH VENUES (2 SHARDS)

on:
  schedule:
    - cron: "35 */12 * * *"
  workflow_dispatch:

concurrency:
  group: fetchvenues-${{ github.ref }}
  cancel-in-progress: false

jobs:

# =====================================================
# 1️⃣ SCRAPE (2 SHARDS)
# =====================================================
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    env:
      SHARD_ID: ${{ matrix.shard }}

    steps:
      # ✅ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🐍 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Install deps
      - name: Install dependencies
        run: |
          pip install playwright cloudscraper aiohttp pytz
          python -m playwright install --with-deps chromium

      # 🚀 Run scrapers in parallel
      - name: Run scrapers
        run: |
          echo "Running shard $SHARD_ID"

          for i in {1..5}; do
            echo "Attempt $i"

            # Ensure output folders exist
            mkdir -p bmsoutput
            mkdir -p output

            # Run BMS (sharded)
            python bmsvenues.py

            # Run district ONLY once (shard 1)
            if [ "$SHARD_ID" == "1" ]; then
              python disvenues.py &
            fi

            wait

            echo "Scrapers finished"
            break

            echo "Retrying..."
            sleep 10
          done

      # 📤 Commit & Push
      - name: Push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bmsoutput/ output/

          git commit -m "Update venues shard $SHARD_ID ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push; then
              echo "Push success"
              break
            fi

            echo "Push failed, retrying..."
            sleep 5
          done
